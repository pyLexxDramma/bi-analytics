# Автодеплой при push в ветку release.
#
# Secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST       — 94.141.105.174 (или DNS)
#   DEPLOY_USER       — dashai
#   DEPLOY_SSH_KEY    — приватный ключ (полный PEM), пара публичного в ~/.ssh/authorized_keys на сервере
#   DEPLOY_SSH_KEY_PASSPHRASE — если ключ с паролем; для CI лучше отдельный ключ без пароля
#   DEPLOY_SSH_PORT   — опционально, если не 22
#   DEPLOY_APP_DIR    — полный путь к клону на сервере (где streamlit_app.py). Если нет — по умолчанию $HOME/apps/bi-analytics
#
name: Deploy release

on:
  push:
    branches: [release]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Add SSH host key
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          PORT="${DEPLOY_SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: SSH deploy
        env:
          REMOTE_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_KEY_PASSPHRASE }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          command_timeout: 20m
          envs: REMOTE_APP_DIR
          script: |
            set -euo pipefail
            APP_DIR="${REMOTE_APP_DIR:-$HOME/apps/bi-analytics}"
            UNIT="bi-analytics.service"
            export XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}"
            if [[ ! -d "$APP_DIR" ]]; then
              echo "ERROR: каталог не существует: $APP_DIR"
              echo "В GitHub → Settings → Secrets → Actions создайте DEPLOY_APP_DIR со значением полного пути к клону (pwd в каталоге с streamlit_app.py)."
              exit 1
            fi
            cd "$APP_DIR"
            git fetch origin
            git checkout release
            git pull --ff-only origin release
            if [[ -x .venv/bin/python ]]; then
              if ! .venv/bin/python -m pip --version &>/dev/null; then
                curl -fsSL https://bootstrap.pypa.io/get-pip.py -o /tmp/get-pip-gha.py
                .venv/bin/python /tmp/get-pip-gha.py --no-warn-script-location
                rm -f /tmp/get-pip-gha.py
              fi
              .venv/bin/python -m pip install --quiet -r requirements.txt
            elif [[ -x .venv/bin/pip ]]; then
              .venv/bin/pip install --quiet -r requirements.txt
            elif python3 -m pip --version &>/dev/null; then
              python3 -m pip install --quiet -r requirements.txt
            else
              curl -fsSL https://bootstrap.pypa.io/get-pip.py -o /tmp/get-pip-gha.py
              python3 /tmp/get-pip-gha.py --user --no-warn-script-location
              rm -f /tmp/get-pip-gha.py
              python3 -m pip install --quiet -r requirements.txt
            fi
            systemctl --user restart "$UNIT"
            systemctl --user is-active "$UNIT" >/dev/null
            echo "Deploy OK: $(git rev-parse --short HEAD) in $APP_DIR"
