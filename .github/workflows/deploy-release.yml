# Автодеплой при push в ветку release.
#
# Secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST       — 94.141.105.174 (или DNS)
#   DEPLOY_USER       — dashai
#   DEPLOY_SSH_KEY    — приватный ключ (полный PEM), пара публичного в ~/.ssh/authorized_keys на сервере
#   DEPLOY_SSH_PORT   — опционально, например 2299 (если не 22)
#   DEPLOY_APP_DIR    — опционально, по умолчанию на сервере: ~/apps/bi-analytics
#
name: Deploy release

on:
  push:
    branches: [release]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Иначе первый SSH с runner падает на проверке host key (~20–30 с).
      - name: Add SSH host key
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          PORT="${DEPLOY_SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          command_timeout: 20m
          script_stop: true
          script: |
            set -euo pipefail
            export DEPLOY_APP_DIR="${{ secrets.DEPLOY_APP_DIR }}"
            bash "${HOME}/apps/bi-analytics/scripts/deploy-release.sh"
