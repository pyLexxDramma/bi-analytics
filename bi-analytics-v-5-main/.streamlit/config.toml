# .streamlit/config.toml

# ┌──────────────────────────────────────────────────────────────────────────┐ #
# │ ⊗ СКРЫВАЕМ САЙДБАР ПО УМОЛЧАНИЮ ЧТОБЫ НЕ БЫЛО МЕРЦАНИЯ ¤ Start           │ #
# └──────────────────────────────────────────────────────────────────────────┘ #

[client]
showSidebarNavigation = false

# ┌──────────────────────────────────────────────────────────────────────────┐ #
# │ ⊗ СКРЫВАЕМ САЙДБАР ПО УМОЛЧАНИЮ ЧТОБЫ НЕ БЫЛО МЕРЦАНИЯ ¤ End             │ #
# └──────────────────────────────────────────────────────────────────────────┘ #


[server]
enableStaticServing = true

# Шрифты: только системный стек (без [[theme.fontFaces]]).
# Раньше подключались 11 файлов Inter с /static/fonts/ — при сбоях сети/прокси это давало лишние запросы
# и иногда ERR_CONNECTION_RESET; виджеты и Plotly не зависят от кастомного woff2.
# При необходимости вернуть Inter — раскомментируйте один [[theme.fontFaces]] на Regular 400.

# =============================================
# Основные настройки темы
# =============================================

[theme]
# Базовая тема: light или dark
base = "dark"

# Шрифты: системные (высокая читаемость без загрузки внешних woff2)
font = "system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
headingFont = "system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
codeFont = "Consolas, 'Courier New', monospace"

# Контраст: светлый текст на тёмно-синем фоне (клиенты Chrome/Yandex, логин, заголовки)
primaryColor = "#38BDF8"
backgroundColor = "#0B2238"
secondaryBackgroundColor = "#102E4A"
textColor = "#F8FAFC"
