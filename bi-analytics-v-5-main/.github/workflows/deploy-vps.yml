# Deploy to VPS on push to main (or master). Configure repository secrets:
#   VPS_HOST, VPS_USER, VPS_PORT, VPS_SSH_KEY (private key for deploy), VPS_DEPLOY_PATH
#
# Optional: VPS_SSH_KNOWN_HOSTS output of: ssh-keyscan -p PORT HOST
#
name: Deploy to VPS

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 20m
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.VPS_DEPLOY_PATH }}"
            git fetch origin
            git checkout "${{ github.ref_name }}"
            git pull origin "${{ github.ref_name }}"
            chmod +x scripts/server_deploy.sh || true
            ./scripts/server_deploy.sh
